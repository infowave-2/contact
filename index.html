<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>INFOWAVE IT - STUDENT CONTACT FORM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="icon" type="image/png" href="https://i.ibb.co/gMfpfStG/circle-infowave.png">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">


    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #000000, #0dbbd7);
        }

        .container {
            width: 550px; /* चौड़ाई को 450px से बढ़ाकर 550px कर दिया गया है */
            background: rgba(255, 255, 255, .95);
            padding: 35px;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
            animation: show .8s;
        }

        @keyframes show {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
            }
        }

        .logo {
            width: 160px; /* लोगो की चौड़ाई को भी थोड़ा बढ़ाया गया है */
            display: block;
            margin: auto;
        }

        .title {
            text-align: center;
            color: rgb(0, 0, 0);
            margin: 10px 0;
            font-size: 26px;
        }

        .subtitle {
            text-align: center;
            color: #777;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .input {
            position: relative;
            margin: 18px 0;
        }

        .input input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #ddd;
            font-size: 15px;
            outline: none;
        }

        .input input:focus {
            border-color: #12b6d3;
            box-shadow: 0 0 8px #12b6d3;
        }

        label {
            font-size: 15px;
            color: #252121;
            font-weight: 600;
        }

        .checkbox {
            margin: 20px 0;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(90deg, #0bbbd8, #05728b);
            color: white;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            transform: scale(1.03);
        }

        /* Background ko Blur karne ke liye */
/* Background Blur aur Overlay */
.popup {
    display: none; /* By default hide rahega */
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 1000;
}

/* Main Popup Box - Hamesha Center me rahega */
.popup-content {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%); /* Ye line isko bilkul center karti hai */
    background: white;
    padding: 40px 30px;
    border-radius: 20px;
    text-align: center;
    width: 90%;
    max-width: 400px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

/* Green Tick Icon */
.success-icon {
    background: rgb(60, 160, 200);
    color: white;
    width: 70px;
    height: 70px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 40px;
    margin: 0 auto 20px auto;
}

.popup-content h2 { 
    color: #201f1f; 
    margin-bottom: 10px; 
    font-size: 24px;
}

.popup-content p { 
    color: #181717; 
    margin-bottom: 25px; 
    line-height: 1.5; 
    font-size: 15px;
}

/* Done Button */
.popup-content button {
    width: 100%;
    padding: 14px;
    background: #42a5f5; /* Button ka blue color */
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

.popup-content button:hover {
    background: #1e88e5;
}
        
    </style>
</head>
<body>

<div class="container">
    <img src="https://i.ibb.co/gMfpfStG/circle-infowave.png" class="logo" alt="Logo">
    <h2 class="title">Student Registration</h2>
    <p class="subtitle">INFOWAVE IT TERMINAL</p>

    <form id="form">
        <div class="input">
            <label>Student Full Name</label>
            <input id="student" placeholder="e.g. Student Full Name" required>
        </div>

        <div class="input">
            <label>Student Contact Number</label>
            <input id="studentContact" maxlength="10" placeholder="e.g. Student Contact Number" required>
        </div>

        <div class="input">
            <label>Parent's Full Name</label>
            <input id="parent" placeholder="e.g. Parent's Full Name" required>
        </div>

        <div class="input">
            <label>Parent's Contact Number</label>
            <input id="parentContact" maxlength="10" placeholder="e.g. Parent's Contact Number" required>
        </div>

        <div class="input">
            <label>Batch Name</label>
            <input id="batch" placeholder="e.g. 2026_January_A_P_7-9" required>
        </div>

        <div class="checkbox">
            <input type="checkbox" id="check">
            &nbsp;I confirm that all information is correct
        </div>

        <button id="btn" type="submit">Submit Application</button>
    </form>
</div>

<div class="popup" id="popup">
    <div class="popup-content">
        <div class="success-icon">✓</div>
        <h2>Thank You!</h2>
        <p>Your form is submitted successfully, Your Details record in INFOWAVE IT</p>
        <button onclick="closePopup()">Done</button>
    </div>
</div>

<script>
    // Apni real SheetDB API ID yahan dalein
    const sheetURL = "https://sheetdb.io/api/v1/0cf4p5lvx4m1f";

    const form = document.getElementById("form");
    const btn = document.getElementById("btn");
    const student = document.getElementById("student");
    const studentContact = document.getElementById("studentContact");
    const parent = document.getElementById("parent");
    const parentContact = document.getElementById("parentContact");
    const batch = document.getElementById("batch");
    const check = document.getElementById("check");
    const popup = document.getElementById("popup");

    // Popup manual close karne ka function
    function closePopup() {
        popup.style.display = "none";
    }

    form.addEventListener("submit", function(e) {
        e.preventDefault();

        let sc = studentContact.value;
        let pc = parentContact.value;

        // 10-digit number validation
        if (!/^[0-9]{10}$/.test(sc) || !/^[0-9]{10}$/.test(pc)) {
            alert("Enter valid 10 digit mobile number");
            return;
        }

        // Checkbox validation
        if (!check.checked) {
            alert("Please confirm details");
            return;
        }

        btn.innerHTML = "Submitting...";
        btn.disabled = true;

        // API Request
        fetch(sheetURL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                data: {
                    STUDENT_NAME: student.value,
                    STUDENT_CONTACT: sc,
                    PARENTS_NAME: parent.value,
                    PARENTS_CONTACT: pc,
                    BATCH_NAME: batch.value
                }
            })
        })
        .then(response => {
            if(response.ok) {
                // Popup show hoga
                popup.style.display = "block"; 
                form.reset();
                
                // Note: Yahan se setTimeout hata diya gaya hai taaki auto-close na ho.
                // Ab popup tabhi close hoga jab user 'Done' button dabayega.
                
            } else {
                alert("Something went wrong. Please try again.");
            }
        })
        .catch(err => {
            console.error(err);
            alert("Error submitting data.");
        })
        .finally(() => {
            btn.innerHTML = "Submit Application";
            btn.disabled = false;
        });
    });
</script>
</body>
</html>
